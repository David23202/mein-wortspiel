name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Android Java Kit
        # Wir installieren NUR noch Java, da alle anderen Bibliotheken auf Ubuntu 22.04 bereits vorinstalliert sind.
        run: |
          sudo apt-get update -y
          sudo apt-get install -y openjdk-17-jdk zip unzip

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.36 kivy==2.3.0 pillow

      - name: Build APK with Buildozer
        # Wir unterdrücken eventuelle Terminal-Blockaden komplett
        run: |
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WortGuru-App
          path: bin/*.apk
